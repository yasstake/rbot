[package]
name = "rbot"
version = "0.2.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "rbot"
crate-type = ["cdylib"]

[dependencies]

chrono = {version= "*"}

strum_macros = {version  = "0.24"}
strum = { version = "0.24", features = ["derive"] }

tokio = { version = "1", features = ["full"] }

rusqlite = {version = "0.28", features=["bundled"]}


serde = {version="1.0"}
serde_json = {version = "1.0"}
serde_derive = {version = "1.0"}

log = {version = "0.4"}
simple_logger = {version = "4.0.0"}

directories= "4.0.1"


polars = {version="0.26"}
polars-core = {version = "0.26", features=["ndarray", "temporal", "dtype-time", "object"]}
polars-lazy = {version="0.26", features=["dynamic_groupby"]}
polars-time = {version="0.26"}

ndarray = {version="0.15"}
numpy = {version="0.17"}

reqwest = {version = "0.11", features=["blocking", "gzip"]}
futures = {version="0.3"}
flate2 = {version="1.0.24"}

csv = {version="1.1.6"}
zip = {version="0.6.3"}

tempfile={version="3.3"}

openssl = { version = "0.10", features = ["vendored"] }

envy={version='0.4'}

futures-util = "0.3"

url = {version="2.3"}
tungstenite = {version="0.18"}
tokio-tungstenite = { version = "0.18", features = ["native-tls", "stream"] }



 [dependencies.pyo3]
 version = "0.17"

 [features]
 extension-module = ["pyo3/extension-module"]


